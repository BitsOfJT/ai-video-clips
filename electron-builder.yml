appId: com.bitsofjt.ai-video-clipper
productName: AI Video Clipper
copyright: Copyright © 2026 BitsOfJT
directories:
  output: out
files:
  - dist-electron/main/main.js
  - dist-electron/preload/preload.cjs
  - dist/**
  - package.json
extraResources:
  - from: assets
    to: assets
    filter:
      - '**/*'
publish:
  provider: github
  owner: BitsOfJT
  repo: ai-video-clips
mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch: arm64
    - target: zip
      arch: arm64
win:
  target:
    - target: nsis
      arch: x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "AI Video Clipper"
