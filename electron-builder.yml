appId: com.bitsofjt.ai-video-clipper
productName: AI Video Clipper
copyright: Copyright © 2026 BitsOfJT
directories:
  output: out
files:
  - dist-electron/main/main.js
  - dist-electron/preload/preload.js
  - dist/**
  - package.json
extraResources:
  - from: assets
    to: assets
    filter:
      - '**/*'
mac:
  category: public.app-category.video
  target:
    - target: dmg
      arch: universal
  x64ArchFiles: "Contents/Resources/assets/bin/*"
  mergeASARs: false
win:
  target:
    - target: nsis
      arch: x64
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "AI Video Clipper"
